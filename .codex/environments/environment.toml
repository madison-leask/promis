# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "PROMIS"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

cd "$(dirname "$0")"

echo "Setting up local PROMIS environment..."

if [ -f "/opt/homebrew/Caskroom/miniforge/base/etc/profile.d/conda.sh" ]; then
    source "/opt/homebrew/Caskroom/miniforge/base/etc/profile.d/conda.sh"
else
    echo "Edit this script to point to your conda.sh location."
    exit 1
fi

if conda env list | awk '{print $1}' | grep -qx "promis_env"; then
    conda env update -n promis_env -f envs/promis_env.yaml --prune
else
    conda env create -f envs/promis_env.yaml
fi

conda activate promis_env

conda config --env --set channel_priority strict
conda config --env --remove channels defaults 2>/dev/null || true
conda config --env --add channels conda-forge || true
conda config --env --add channels bioconda || true

rm -rf .snakemake/conda

python --version
snakemake --version

# Check repo structure
for f in snakefile envs/promis_env.yaml config/config.yaml scripts/preprocess/find_MS_sites.py; do
    test -f "$f" || { echo "Missing expected file: $f"; exit 1; }
done

# Reference check for your hg19 use
if [ -f "input/resources/reference/hg19.fa" ]; then
    echo "Found hg19 reference."
else
    echo "hg19.fa not found at input/resources/reference/hg19.fa"
    echo "Adjust path in config/config.yaml or place the file there."
fi

echo
echo "Run next:"
echo "  conda activate promis_env"
echo "  snakemake -np -c 1 --use-conda"

'''
