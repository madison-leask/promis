{% set name = "promis" %}
{% set version = "0.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  git_url: https://github.com/vlachosg37/promis.git
  git_rev: v{{ version }}


build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vv

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=64
    - pandas >=1.5
    - numpy >=1.23
    - scikit-learn >=1.1
    - matplotlib-base >=3.5
    - seaborn >=0.11
    - pysam >=0.21
    - pyyaml >=5.4
    - rich >=13
    - tqdm >=4.64
    - numba >=0.57
    - snakemake >=9.9.0
  run:
    - python >=3.9
    - pandas >=1.5
    - numpy >=1.23
    - scikit-learn >=1.1
    - matplotlib-base >=3.5
    - seaborn >=0.11
    - pysam >=0.21
    - pyyaml >=5.4
    - rich >=13
    - tqdm >=4.64
    - numba >=0.57
    - snakemake >=9.9.0


test:
  commands:
    - promis --help
    - promis --print-config > /dev/null
    - promis --workflow-dir > /dev/null
    - promis-find-ms-sites --help

about:
  home: https://github.com/promis-bio/promis
  summary: Snakemake pipeline for microsatellite instability analysis
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - promis-bio
  channels:
    - conda-forge
    - bioconda
    - defaults

